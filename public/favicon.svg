<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2c1a0e" />
      <stop offset="100%" stop-color="#140802" />
    </radialGradient>
    
    <!-- Gold / Copper Border Gradient -->
    <linearGradient id="goldBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5cc9e" />
      <stop offset="30%" stop-color="#c18a53" />
      <stop offset="70%" stop-color="#824c1e" />
      <stop offset="100%" stop-color="#dfa56b" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Orange/Gold Neon Gradient for Paths -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd5a4" />
      <stop offset="50%" stop-color="#e8a361" />
      <stop offset="100%" stop-color="#b86b24" />
    </linearGradient>
  </defs>

  <!-- Squircle Outer Container (Matches the uploaded icon) -->
  <rect x="24" y="24" width="464" height="464" rx="100" fill="url(#bgGrad)" stroke="url(#goldBorderGrad)" stroke-width="12" />

  <!-- Inside Symbol (Calendar + Barber concept) -->
  <!-- Centered with perfect margins -->
  <g transform="translate(116, 116)" filter="url(#glow)">
    <!-- Main Outer Box of Calendar Symbol (width: 280, height: 260) with rounded corners -->
    <rect x="10" y="40" width="260" height="220" rx="30" fill="none" stroke="url(#neonGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Vertical Tabs on Top (Hangers) -->
    <!-- Left Hanger -->
    <rect x="60" y="10" width="24" height="60" rx="12" fill="none" stroke="url(#neonGrad)" stroke-width="14" />
    
    <!-- Right Hanger -->
    <rect x="196" y="10" width="24" height="60" rx="12" fill="none" stroke="url(#neonGrad)" stroke-width="14" />

    <!-- Horizontal line dividing top-quarter -->
    <line x1="10" y1="120" x2="270" y2="120" stroke="url(#neonGrad)" stroke-width="14" stroke-linecap="round" />

    <!-- Left graphic (Horizontal key-like or razor element with a loop and a straight horizontal stem) -->
    <!-- Circular loop on left -->
    <circle cx="56" cy="180" r="26" fill="none" stroke="url(#neonGrad)" stroke-width="14" />
    <!-- Line extending from the outer circle horizontally crossing over the center -->
    <line x1="82" y1="180" x2="210" y2="180" stroke="url(#neonGrad)" stroke-width="14" stroke-linecap="round" />

    <!-- Center vertical bar (resembling Clipper/Needle/Comb) with circular head -->
    <!-- Vertical line downward -->
    <line x1="140" y1="180" x2="140" y2="240" stroke="url(#neonGrad)" stroke-width="14" stroke-linecap="round" />
    <!-- Circular head with a line up -->
    <circle cx="140" cy="120" r="26" fill="none" stroke="url(#neonGrad)" stroke-width="14" />
  </g>
</svg>
